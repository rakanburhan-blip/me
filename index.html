<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSKiLL | Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: sans-serif;}
        body{background:#000;color:#fff;overflow:hidden;height:100vh;}

        /* شاشة الدخول */
        .enter-screen{
            position:fixed;width:100%;height:100%;background:#000;
            display:flex;justify-content:center;align-items:center;
            z-index:9999;cursor:pointer;font-size:1.2rem;
            letter-spacing:5px;transition:0.8s;text-transform:uppercase;
        }

        /* الفيديو الخلفية */
        video{
            position:fixed;top:0;left:0;width:100%;height:100%;
            object-fit:cover;z-index:-2;filter: brightness(0.6);
        }

        /* حاوية الروابط */
        .container{
            display:flex;flex-direction:column;align-items:center;
            justify-content:center;height:100vh;opacity:0;
            transform:translateY(20px);transition:1.5s;
        }

        .profile-img{
            width:110px;height:110px;border-radius:50%;
            border:1.5px solid rgba(255,255,255,0.5);margin-bottom:15px;
            object-fit: cover;
        }

        h1{font-size:2rem;margin-bottom:20px;text-shadow: 0 0 15px rgba(255,255,255,0.5);}

        .links{display:flex;flex-direction:column;gap:10px;}
        .link-card{
            width:280px;padding:12px;background:rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.1);border-radius:12px;
            text-decoration:none;color:#fff;display:flex;
            align-items:center;justify-content:center;gap:10px;
            backdrop-filter:blur(8px);transition:0.3s;
        }
        .link-card:hover{background:rgba(255,255,255,0.2);transform:scale(1.03);}

    </style>
</head>
<body>

<div class="enter-screen" id="entry" onclick="startSite()">[ click to enter ]</div>

<video id="v" loop playsinline muted>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="container" id="main">
    <img src="https://i.pinimg.com/736x/8a/80/e5/8a80e55720977462058b76c94314120b.jpg" class="profile-img">
    <h1>iSKiLL</h1>
    <div class="links">
        <a href="https://instagram.com/i.1gw" class="link-card"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://snapchat.com/add/i.1gw" class="link-card"><i class="fab fa-snapchat"></i> Snapchat</a>
        <a href="https://tiktok.com/@.0l9o" class="link-card"><i class="fab fa-tiktok"></i> TikTok</a>
        <a href="#" class="link-card" onclick="alert('Discord: .3.en')"><i class="fab fa-discord"></i> Discord</a>
    </div>
</div>

<script>
    function startSite(){
        document.getElementById('entry').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('entry').style.display = 'none';
            document.getElementById('main').style.opacity = '1';
            document.getElementById('main').style.transform = 'translateY(0)';
            let v = document.getElementById('v');
            v.muted = false;
            v.play();
        }, 500);
    }
</script>
</body>
</html>
