<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Video Handling</title>
</head>
<body>
    <h1>Welcome to Improved Video Handling</h1>

    <video controls autoplay loop>
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        <source src="video.ogv" type="video/ogg">
        Your browser does not support the video tag. Please update your browser or use a different one.
    </video>

    <script>
        const video = document.querySelector('video');
        // Detect if autoplay is allowed
        video.muted = true; // Autoplay will generally work if the video is muted
        video.play().catch(error => {
            console.error('Autoplay was prevented:', error);
            // Fallback handling for browsers that do not allow autoplay
            alert('Please start the video manually.');
        });
    </script>
</body>
</html>
