<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> iSKiLL </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0; padding: 0;
      background: black; color: white; font-family: Arial;
      min-height: 100vh; overflow: hidden;
    }
    .bg-video {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      object-fit: cover; z-index: -2;
    }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.4); z-index: -1;
    }
    .container {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
    }
    .profile {
      width: 110px; height: 110px;
      border-radius: 50%; border: 3px solid #fff;
      object-fit: cover; margin-bottom: 10px;
    }
    h1 { margin-bottom: 13px; letter-spacing:2px;}
    .link {
      width: 250px; padding: 13px; border-radius: 12px;
      border: 2px solid #fff; color: #fff; background:rgba(0,0,0,0.2);
      text-decoration: none; display: flex; gap: 12px;
      align-items: center; justify-content: center;
      margin-bottom: 7px; transition: 0.3s;
    }
    .link:hover { background: rgba(0,0,0,0.45); color:#00ffea; border-color: #00ffea; }
    .spotify-player {
      margin: 25px 0 0 0; border-radius: 18px; overflow: hidden;
      max-width: 350px;
    }
    @media(max-width:600px){
      .spotify-player { max-width: 95vw; }
      .container { gap:10px; }
    }
  </style>
</head>
<body>
  <video class="bg-video" src="bg.mp4" autoplay loop muted playsinline></video>
  <div class="overlay"></div>
  <div class="container">
    <img src="https://www.pinterest.com/pin/240942648809704963/.jpg" class="profile" alt="Profile">
    <h1> iSKiLL </h1>
    <a class="link" href="https://instagram.com/i.1gw" target="_blank"><i class="fab fa-instagram"></i> Instagram </a>
    <a class="link" href="https://snapchat.com/add/i.1gw" target="_blank"><i class="fab fa-snapchat"></i> Snapchat </a>
    <a class="link" href="https://tiktok.com/@.0l9o" target="_blank"><i class="fab fa-tiktok"></i> TikTok </a>
    <a class="link" href="#" onclick="copyDiscord()"><i class="fab fa-discord"></i> Discord </a>
    <div class="spotify-player">
      <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/7pFTpiYeSCfkmLeERh21M7?utm_source=generator&theme=0"
        width="100%" height="80" frameBorder="0" allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; picture-in-picture"></iframe>
    </div>
  </div>
  <script>
    function copyDiscord(){
      navigator.clipboard.writeText(".3.en");
      alert("تم نسخ الديسكورد 🔥");
    }
  </script>
</body>
</html>
